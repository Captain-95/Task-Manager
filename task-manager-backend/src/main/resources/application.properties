spring.application.name=task-manager-backend
server.port=8080

# H2 in-memory database (used ONLY for User / Role / UserRole - auth tables).
# No setup needed - resets every restart. Tasks themselves are kept in a
# plain in-memory List/Map as required by the assignment.
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=Th1sIsAVeryLongSecretKeyUsedForJwtSigningPurposeOnly123456
jwt.expiration-ms=86400000

# CORS - Angular dev server
app.cors.allowed-origins=http://localhost:4200,https://your-frontend.vercel.app

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
